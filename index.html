<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeMaster Pro - Smart Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; transition: all 0.3s; cursor: pointer; border: 1px solid transparent; }
        .day-cell:hover { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); }
        .has-data { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: transform 0.2s; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        input[type="time"] { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px; border-radius: 8px; width: 100%; text-align: center; }
        
        /* אנימציה להחלפת גדלים */
        .timer-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto p-6 pb-36">
        <div class="flex justify-between items-center mb-8">
            <div>
                <div class="text-2xl font-black tracking-tighter text-white">TIME<span class="text-blue-500">PRO</span></div>
                <div id="live-clock" class="text-xs font-mono text-blue-400/60"></div>
            </div>
            <div id="current-mode-badge" class="status-badge bg-slate-800 text-slate-400">לא פעיל</div>
        </div>

        <div id="main-status" class="glass rounded-[2.5rem] p-8 mb-8 shadow-2xl relative overflow-hidden border-blue-500/20">
            <div class="relative z-10 flex flex-col items-center">
                
                <div id="timers-container" class="w-full flex flex-col items-center">
                    <div id="work-timer-wrapper" class="timer-transition order-1 w-full text-center">
                        <p id="work-label" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1">זמן עבודה נטו</p>
                        <h2 id="timer-display" class="text-6xl font-black tracking-tight mb-4">00:00:00</h2>
                    </div>

                    <div id="break-timer-wrapper" class="timer-transition order-2 w-full text-center mt-2 opacity-50">
                        <p id="break-label" class="text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-1">זמן הפסקה</p>
                        <h2 id="break-time-display" class="text-2xl font-black tracking-tight">00:00:00</h2>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 text-xs w-full mt-6">
                    <div class="bg-white/5 p-3 rounded-2xl">
                        <span class="opacity-50 block mb-1">כניסה</span>
                        <b id="entry-time" class="text-sm">--:--</b>
                    </div>
                    <div class="bg-white/5 p-3 rounded-2xl">
                        <span class="opacity-50 block mb-1 uppercase text-amber-500/70">הפסקה אחרונה</span>
                        <b id="last-break-info" class="text-sm">00:00</b>
                    </div>
                </div>

                <div class="flex gap-3 mt-6 w-full">
                    <button id="break-btn" onclick="toggleBreak()" class="hidden flex-1 bg-amber-500/20 text-amber-500 border border-amber-500/30 py-4 rounded-xl font-bold text-sm">הפסקה</button>
                    <button id="manual-btn" onclick="handleManualAction()" class="flex-1 btn-gradient py-4 rounded-xl font-bold text-sm shadow-lg shadow-blue-500/20 text-white">דיווח ידני</button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-8 left-6 right-6 max-w-md mx-auto glass rounded-3xl p-2 flex z-50 shadow-2xl">
            <button onclick="showTab('scan')" id="nav-scan" class="flex-1 py-4 rounded-2xl font-bold transition-all bg-blue-600">סריקה</button>
            <button onclick="showTab('calendar')" id="nav-calendar" class="flex-1 py-4 rounded-2xl font-bold transition-all text-slate-400">לוח שנה</button>
            <button onclick="showTab('qr')" id="nav-qr" class="flex-1 py-4 rounded-2xl font-bold transition-all text-slate-400">קוד QR</button>
        </nav>

        <div id="scan" class="tab-content active text-center">
            <div class="glass rounded-[2.5rem] p-4">
                <div id="reader" class="rounded-3xl overflow-hidden bg-black aspect-square"></div>
                <div id="toast" class="mt-4 p-4 rounded-2xl text-center font-bold hidden"></div>
            </div>
        </div>

        <div id="calendar" class="tab-content">
            <div class="glass rounded-[2.5rem] p-6">
                <div class="flex justify-between items-center mb-8">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full">❮</button>
                    <h3 id="month-label" class="text-xl font-extrabold tracking-tight"></h3>
                    <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full">❯</button>
                </div>
                <div id="calendar-days" class="calendar-grid"></div>
                <button onclick="clearData()" class="w-full mt-10 text-[10px] text-red-500/50 font-bold uppercase tracking-widest">איפוס מערכת</button>
            </div>
        </div>
        
        <div id="qr" class="tab-content">
            <div class="glass rounded-[2.5rem] p-10 text-center">
                <div class="bg-white p-6 rounded-3xl inline-block mb-8 shadow-2xl">
                    <div id="qr-box"></div>
                </div>
                <button onclick="downloadQR()" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl shadow-xl">הורד QR</button>
            </div>
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="glass w-full max-w-xs p-8 rounded-[2.5rem] text-center" onclick="event.stopPropagation()">
            <h4 id="modal-date" class="text-2xl font-black mb-6 text-blue-400"></h4>
            <div id="modal-view-mode" class="space-y-3">
                <div class="flex justify-between p-4 bg-white/5 rounded-2xl"><span>כניסה</span><span id="modal-entry" class="text-green-400 font-bold"></span></div>
                <div class="flex justify-between p-4 bg-white/5 rounded-2xl"><span>יציאה</span><span id="modal-exit" class="text-red-400 font-bold"></span></div>
                <div class="flex justify-between p-4 bg-white/5 rounded-2xl"><span>הפסקות</span><span id="modal-break" class="text-amber-500 font-bold"></span></div>
                <div class="flex justify-between p-4 bg-blue-500/20 rounded-2xl"><span>נטו</span><span id="modal-total" class="font-black"></span></div>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="toggleEditMode(true)" class="bg-blue-600/20 text-blue-400 py-3 rounded-xl font-bold">עריכה</button>
                    <button onclick="resetDay()" class="bg-red-600/20 text-red-400 py-3 rounded-xl font-bold">מחיקה</button>
                </div>
            </div>
            <div id="modal-edit-mode" class="hidden space-y-4">
                <input type="time" id="edit-start">
                <input type="time" id="edit-end">
                <button onclick="saveDayEdit()" class="w-full bg-green-600 py-3 rounded-xl font-bold">שמור</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-500 font-bold">סגור</button>
        </div>
    </div>

    <script>
        let scanner;
        let currentMonth = new Date();
        let selectedDayKey = null;
        const WORK_CODE = "WORK_CLOCK_SYSTEM";

        window.onload = () => {
            initQR();
            startScanner();
            renderCalendar();
            setInterval(updateUI, 1000);
        };

        function processAction(val) {
            if (val !== WORK_CODE) return;
            const now = new Date().getTime();
            const dateKey = formatDateKey(new Date());
            let data = JSON.parse(localStorage.getItem('time_logs') || '{}');

            if (!data[dateKey]) {
                data[dateKey] = { start: now, end: null, breaks: [], onBreak: false };
                notify("כניסה נרשמה", "bg-green-500");
            } else if (!data[dateKey].end) {
                // --- הגנת 2 דקות ---
                const diffMinutes = (now - data[dateKey].start) / 1000 / 60;
                if (diffMinutes < 1) {
                    notify("לא ניתן להגדיר יציאה לאחר פחות מדקה", "bg-red-600");
                    return;
                }
                // ------------------
                if(data[dateKey].onBreak) toggleBreak();
                data[dateKey].end = now;
                notify("יציאה נרשמה", "bg-blue-500");
            } else {
                notify("היום כבר דווח", "bg-slate-600");
            }
            localStorage.setItem('time_logs', JSON.stringify(data));
            renderCalendar();
        }

        function toggleBreak() {
            const dateKey = formatDateKey(new Date());
            let data = JSON.parse(localStorage.getItem('time_logs') || '{}');
            const day = data[dateKey];
            if (!day || day.end) return;
            const now = new Date().getTime();
            if (!day.onBreak) {
                day.breaks.push({ start: now, end: null });
                day.onBreak = true;
            } else {
                const currentBreak = day.breaks.find(b => b.end === null);
                if (currentBreak) currentBreak.end = now;
                day.onBreak = false;
            }
            localStorage.setItem('time_logs', JSON.stringify(data));
        }

        function updateUI() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('he-IL');
            const data = JSON.parse(localStorage.getItem('time_logs') || '{}');
            const day = data[formatDateKey(now)];
            const badge = document.getElementById('current-mode-badge');
            
            const workWrapper = document.getElementById('work-timer-wrapper');
            const breakWrapper = document.getElementById('break-timer-wrapper');
            const timerDisplay = document.getElementById('timer-display');
            const breakDisplay = document.getElementById('break-time-display');

            if (day && !day.end) {
                const totalPastBreaks = calculateBreakTime(day.breaks);
                const currentBreakStart = day.onBreak ? day.breaks[day.breaks.length-1].start : 0;
                const elapsedWork = (day.onBreak ? currentBreakStart : now.getTime()) - day.start - totalPastBreaks;
                
                timerDisplay.innerText = formatDiff(elapsedWork);
                document.getElementById('entry-time').innerText = formatT(day.start);

                // ניהול תצוגת הפסקה אחרונה
                const lastFinishedBreak = [...day.breaks].reverse().find(b => b.end !== null);
                document.getElementById('last-break-info').innerText = lastFinishedBreak ? 
                    formatDiffShort(lastFinishedBreak.end - lastFinishedBreak.start) : "00:00";

                if (day.onBreak) {
                    // מצב הפסקה: הגדלת טיימר הפסקה
                    const currentBreakDur = now.getTime() - currentBreakStart;
                    breakDisplay.innerText = formatDiff(currentBreakDur);
                    
                    workWrapper.classList.replace('order-1', 'order-2');
                    workWrapper.style.opacity = "0.4";
                    timerDisplay.classList.replace('text-6xl', 'text-2xl');
                    
                    breakWrapper.classList.replace('order-2', 'order-1');
                    breakWrapper.style.opacity = "1";
                    breakDisplay.classList.replace('text-2xl', 'text-6xl');
                    breakDisplay.classList.add('text-amber-500');

                    badge.innerText = "בהפסקה";
                    badge.className = "status-badge bg-amber-500/20 text-amber-500";
                } else {
                    // מצב עבודה: הגדלת טיימר עבודה
                    breakDisplay.innerText = "00:00:00";
                    
                    workWrapper.classList.replace('order-2', 'order-1');
                    workWrapper.style.opacity = "1";
                    timerDisplay.classList.replace('text-2xl', 'text-6xl');
                    
                    breakWrapper.classList.replace('order-1', 'order-2');
                    breakWrapper.style.opacity = "0.4";
                    breakDisplay.classList.replace('text-6xl', 'text-2xl');
                    breakDisplay.classList.remove('text-amber-500');

                    badge.innerText = "בעבודה";
                    badge.className = "status-badge bg-green-500/20 text-green-500";
                }
                document.getElementById('break-btn').classList.remove('hidden');
                document.getElementById('break-btn').innerText = day.onBreak ? "חזור לעבוד" : "צא להפסקה";
                document.getElementById('manual-btn').innerText = "דווח יציאה";
            } else {
                timerDisplay.innerText = "00:00:00";
                breakDisplay.innerText = "00:00:00";
                document.getElementById('break-btn').classList.add('hidden');
                document.getElementById('manual-btn').innerText = "דיווח כניסה";
                badge.innerText = "לא פעיל";
                badge.className = "status-badge bg-slate-800 text-slate-400";
            }
        }

        // שאר הפונקציות (עריכה, לוח שנה, סורק) נשארות כפי שהיו
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scan') startScanner();
            else if(scanner) scanner.stop().catch(()=>{});
        }
        function startScanner() {
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (val) => processAction(val)).catch(()=>{});
        }
        function handleManualAction() { processAction(WORK_CODE); }
        function calculateBreakTime(breaks) { return (breaks || []).reduce((t, b) => t + (b.end ? (b.end - b.start) : 0), 0); }
        function formatT(ts) { return new Date(ts).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'}); }
        function formatDiff(ms) {
            const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), s = Math.floor((ms % 60000) / 1000);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        function formatDiffShort(ms) {
            const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        function formatDateKey(d) { return d.toLocaleDateString('he-IL').replace(/\./g, '/'); }
        function notify(msg, cls) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.className = `mt-4 p-4 rounded-2xl text-center font-bold block ${cls} text-white`;
            t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000);
        }
        function renderCalendar() {
            const container = document.getElementById('calendar-days'); container.innerHTML = '';
            const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
            document.getElementById('month-label').innerText = currentMonth.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const data = JSON.parse(localStorage.getItem('time_logs') || '{}');
            for (let d = 1; d <= daysInMonth; d++) {
                const key = formatDateKey(new Date(year, month, d));
                const dayData = data[key];
                const cell = document.createElement('div');
                cell.className = 'day-cell' + (dayData ? ' has-data' : '');
                cell.innerHTML = `<span class="text-xs">${d}</span>`;
                cell.onclick = () => openModal(key, dayData);
                container.appendChild(cell);
            }
        }
        function openModal(key, data) {
            selectedDayKey = key; toggleEditMode(false);
            const info = data || { start: 0, end: 0, breaks: [] };
            const totalB = calculateBreakTime(info.breaks);
            document.getElementById('modal-date').innerText = key;
            document.getElementById('modal-entry').innerText = info.start ? formatT(info.start) : '--:--';
            document.getElementById('modal-exit').innerText = info.end ? formatT(info.end) : '--:--';
            document.getElementById('modal-break').innerText = formatDiff(totalB);
            document.getElementById('modal-total').innerText = info.end ? formatDiff(info.end - info.start - totalB) : '00:00:00';
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function toggleEditMode(e) { document.getElementById('modal-view-mode').classList.toggle('hidden', e); document.getElementById('modal-edit-mode').classList.toggle('hidden', !e); }
        function initQR() { new QRCode(document.getElementById("qr-box"), { text: WORK_CODE, width: 200, height: 200 }); }
        function downloadQR() { const canvas = document.querySelector('#qr-box canvas'); const l = document.createElement('a'); l.href = canvas.toDataURL(); l.download = 'qr.png'; l.click(); }
        function clearData() { if(confirm("למחוק הכל?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
